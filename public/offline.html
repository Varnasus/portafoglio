<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Zach Varney</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container { max-width: 500px; text-align: center; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; color: #a1a1aa; }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            background: #2d5a27;
            color: #fff;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .links { margin-top: 2rem; }
        .links a { color: #4a8c42; text-decoration: none; margin: 0 0.75rem; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Offline</h1>
        <p>Check your connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Retry</button>
        <div class="links">
            <a href="/">Home</a>
            <a href="/work">Work</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>
    </div>
    <script>
        window.addEventListener('online', function() { window.location.href = '/'; });
    </script>
</body>
</html>
