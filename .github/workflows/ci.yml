name: CI - Lint and Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build
        env:
          # Prevent build from failing on warnings
          CI: false

      - name: Check build output
        run: |
          if [ -d ".next" ]; then
            echo "✓ Build successful - .next directory created"
            ls -lah .next
          else
            echo "✗ Build failed - .next directory not found"
            exit 1
          fi
